version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: syncly_postgres
    environment:
      POSTGRES_USER: syncly
      POSTGRES_PASSWORD: synclypass
      POSTGRES_DB: syncly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncly -d syncly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: syncly_redis
    command: redis-server --requirepass synclyredis --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "synclyredis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: syncly_backend
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://syncly:synclypass@postgres:5432/syncly
      REDIS_URL: redis://:synclyredis@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: syncly_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: http://localhost:4000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
